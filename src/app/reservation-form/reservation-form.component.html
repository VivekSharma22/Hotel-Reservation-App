<app-home></app-home>

<div class="container d-flex justify-content-center mt-5">
  <div class="card shadow-sm p-4" style="min-width: 400px; max-width: 500px; width: 100%;">

<h4 class="text-center text-secondary mb-4">Reservation Form</h4>

<form [formGroup]="reservationForm" (ngSubmit)="onSubmit()">

  <!-- Check In -->
  <div class="mb-3">
    <label class="form-label">Check In Date</label>
    <input class="form-control" formControlName="checkInDate" type="date">
    <div class="text-danger small mt-1"
      *ngIf="reservationForm.get('checkInDate')?.invalid && reservationForm.get('checkInDate')?.touched">
      This field is required
    </div>
  </div>

  <!-- Check Out -->
  <div class="mb-3">
    <label class="form-label">Check Out Date</label>
    <input class="form-control" formControlName="checkOutDate" type="date">
    <div class="text-danger small mt-1"
      *ngIf="reservationForm.get('checkOutDate')?.invalid && reservationForm.get('checkOutDate')?.touched">
      This field is required
    </div>
  </div>

  <!-- Guest Name -->
  <div class="mb-3">
    <label class="form-label">Guest Name</label>
    <input class="form-control" formControlName="guestName" type="text">
    <div class="text-danger small mt-1"
      *ngIf="reservationForm.get('guestName')?.invalid && reservationForm.get('guestName')?.touched">
      This field is required
    </div>
  </div>

  <!-- Guest Email -->
  <div class="mb-3">
    <label class="form-label">Guest Email</label>
    <input class="form-control" formControlName="guestEmail" type="email">
    <div class="text-danger small mt-1"
      *ngIf="reservationForm.get('guestEmail')?.invalid && reservationForm.get('guestEmail')?.touched">
      Enter a valid email
    </div>
  </div>

  <!-- Room Number -->
  <div class="mb-4">
    <label class="form-label">Room Number</label>
    <input class="form-control" formControlName="roomNumber" type="number">
    <div class="text-danger small mt-1"
      *ngIf="reservationForm.get('roomNumber')?.invalid && reservationForm.get('roomNumber')?.touched">
      This field is required
    </div>
  </div>

  <!-- Submit -->
  <button class="btn btn-secondary w-100" type="submit" [disabled]="reservationForm.invalid">
    Submit
  </button>

</form>

  </div>
</div>
